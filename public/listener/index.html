<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Receiver — Church Translator</title>
  <link rel="stylesheet" href="/shared.css"/>
</head>
<body>
<div class="app">

  <header class="header">
    <a href="/" class="back">← Home</a>
    <div class="role-badge green">🎧 Visitor — Receiver</div>
    <h1>Live Translation</h1>
    <p>Translation from the service plays automatically here</p>
  </header>

  <!-- Activate button — browsers need a tap before TTS works -->
  <button class="go-btn green" id="activate-btn">
    <span>▶</span>
    <span id="activate-label">Tap to start receiving</span>
  </button>

  <!-- Stop sound button -->
  <button class="ctrl-btn stop-btn hidden" id="stop-btn">⏹ Stop speaking</button>

  <!-- Connection status -->
  <div class="stats-row">
    <div class="stat-box">
      <span class="stat-label">Connection</span>
      <span class="stat-val" id="conn-status">Waiting…</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Phrases received</span>
      <span class="stat-val" id="phrases-received">0</span>
    </div>
  </div>

  <!-- Settings -->
  <section class="card">
    <h2 class="card-title">⚙️ Settings</h2>

    <div class="field">
      <label>🎧 I want to hear in</label>
      <select id="tgt-lang">
        <option value="ne">🇳🇵 Nepali</option>
        <option value="en">🇬🇧 English</option>
        <option value="ro">🇷🇴 Romanian</option>
        <option value="hi">🇮🇳 Hindi</option>
        <option value="fr">🇫🇷 French</option>
        <option value="de">🇩🇪 German</option>
        <option value="es">🇪🇸 Spanish</option>
        <option value="it">🇮🇹 Italian</option>
        <option value="pt">🇵🇹 Portuguese</option>
        <option value="ru">🇷🇺 Russian</option>
        <option value="uk">🇺🇦 Ukrainian</option>
        <option value="pl">🇵🇱 Polish</option>
        <option value="hu">🇭🇺 Hungarian</option>
        <option value="ar">🇸🇦 Arabic</option>
        <option value="zh">🇨🇳 Chinese</option>
        <option value="ja">🇯🇵 Japanese</option>
        <option value="ko">🇰🇷 Korean</option>
      </select>
    </div>

    <div class="field">
      <div class="row" style="gap:10px;align-items:center">
        <label style="flex:0 0 auto;font-size:13px;color:var(--text2)">🐢 Speed</label>
        <input type="range" id="speed" min="0.5" max="1.4" step="0.05" value="0.85"/>
        <span id="speed-val" class="badge">0.85×</span>
      </div>
    </div>

    <div class="field">
      <div class="row" style="gap:10px;align-items:center">
        <label style="flex:0 0 auto;font-size:13px;color:var(--text2)">🔊 Volume</label>
        <input type="range" id="volume" min="0" max="1" step="0.05" value="1"/>
        <span id="vol-val" class="badge">100%</span>
      </div>
    </div>

    <div class="field">
      <label class="checkbox-label">
        <input type="checkbox" id="show-interim"/>
        Show partial phrases while translating
      </label>
    </div>
  </section>

  <!-- Translation display -->
  <div class="panel big" id="tgt-panel">
    <div class="panel-label">
      <span class="dot green-dot" id="recv-dot"></span>
      Translation — <span id="tgt-lang-label">Nepali</span>
    </div>
    <div class="panel-body big-body" id="tgt-body">
      <span class="ph">Waiting for broadcast…</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="ctrl-bar">
    <button class="ctrl-btn" id="replay-btn">🔊 Replay last</button>
    <button class="ctrl-btn" id="clear-btn">✕ Clear</button>
  </div>

  <div class="status-bar" id="status">Tap the button above to activate.</div>

</div>
<script src="/receiver.js"></script>
</body>
</html>
